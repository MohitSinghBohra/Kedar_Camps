# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Neon PostgreSQL) ───────────────────────────────────────────────
# On Render, set environment variable DATABASE_URL to your Neon connection string
# Format: jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.kedar=INFO
logging.level.org.springframework.web=WARN

# ── App config ───────────────────────────────────────────────────────────────
app.cors.allowed-origins=https://kedar-camps.vercel.app/,http://localhost:3000
